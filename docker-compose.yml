version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: nepali_legal_postgres
    environment:
      POSTGRES_USER: legal_user
      POSTGRES_PASSWORD: legal_password
      POSTGRES_DB: nepali_legal_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - legal_network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: nepali_legal_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - legal_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: legal_backend
    ports:
      - "8000:8000"
    environment:
      # Matches your exact PostgreSQL credentials above
      - DATABASE_URL=postgresql://legal_user:legal_password@postgres:5432/nepali_legal_ai
      - QDRANT_URL=http://qdrant:6333
      # Points to the host machine running native Ollama
      - OLLAMA_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=llama3.2:3b
    depends_on:
      - postgres
      - qdrant
    networks:
      - legal_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: legal_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - legal_network

volumes:
  postgres_data:
  qdrant_data:

networks:
  legal_network:
    driver: bridge